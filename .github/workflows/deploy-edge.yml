# Cloudflare Worker 自动部署流程。
#
# 需要在 GitHub Actions secrets 中配置仓库级 secrets：
# - CLOUDFLARE_API_TOKEN
# - CLOUDFLARE_ACCOUNT_ID

name: Deploy Downcity Edge Block

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-edge.yml"
      - "cities/edge/**"
      - "cities/shared/**"
      - "packages/city/**"
      - "packages/services/**"
      - "pnpm-lock.yaml"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-downcity-edge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 校验 Cloudflare 凭据
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "缺少 GitHub Actions secret: CLOUDFLARE_API_TOKEN"
            exit 1
          fi

          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "缺少 GitHub Actions secret: CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.13.1"

      - name: 激活 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建 Worker 依赖包
        run: |
          set -euo pipefail
          pnpm -C packages/city build
          pnpm -C packages/services build

      - name: 检查 Edge 街区类型
        run: pnpm -C cities/edge typecheck

      - name: 部署 Worker
        working-directory: cities/edge
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy
