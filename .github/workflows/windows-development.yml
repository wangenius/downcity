name: Windows development support

on:
  pull_request:
    paths:
      - ".github/workflows/windows-development.yml"
      - "packages/agent/**"
      - "packages/cli/**"
      - "packages/shell/**"
      - "packages/sandbox-windows-mxc/**"
      - "packages/sandbox-windows-srt/**"
      - "packages/type/**"
      - "scripts/clean-package.mjs"
      - "pnpm-lock.yaml"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/windows-development.yml"
      - "packages/agent/**"
      - "packages/cli/**"
      - "packages/shell/**"
      - "packages/sandbox-windows-mxc/**"
      - "packages/sandbox-windows-srt/**"
      - "packages/type/**"
      - "scripts/clean-package.mjs"
      - "pnpm-lock.yaml"
  workflow_dispatch:

jobs:
  windows-development:
    name: Native Windows SDK, MXC, and SRT
    runs-on: windows-2025
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.13.1"
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI dependency closure
        run: pnpm -r --filter "downcity..." build

      - name: Verify Windows command and sandbox adapter models
        run: node --test packages/shell/scripts/shell-command-model.test.mjs packages/sandbox-windows-mxc/scripts/windows-mxc-command-line.test.mjs packages/sandbox-windows-mxc/scripts/windows-mxc-policy.test.mjs packages/sandbox-windows-mxc/scripts/windows-mxc-support.test.mjs packages/sandbox-windows-srt/scripts/windows-srt-policy.test.mjs packages/sandbox-windows-srt/scripts/windows-srt-environment.test.mjs packages/cli/scripts/windows-platform.test.mjs

      - name: Verify CLI platform storage
        working-directory: packages/cli
        run: node --test scripts/config-storage.test.mjs

      - name: Verify native MXC isolation
        run: node --test packages/sandbox-windows-mxc/scripts/windows-mxc.integration.test.mjs

      - name: Install native SRT isolation
        run: node packages/sandbox-windows-srt/bin/cli.js setup

      - name: Verify native SRT isolation
        env:
          DC_WINDOWS_SRT_INTEGRATION: "1"
        run: node --test packages/sandbox-windows-srt/scripts/windows-srt.integration.test.mjs

      - name: Remove native SRT isolation
        if: always()
        run: node packages/sandbox-windows-srt/bin/cli.js remove

      - name: Typecheck affected packages
        shell: pwsh
        run: |
          pnpm -C packages/shell typecheck
          if ($LASTEXITCODE) { exit $LASTEXITCODE }
          pnpm -C packages/sandbox-windows-mxc typecheck
          if ($LASTEXITCODE) { exit $LASTEXITCODE }
          pnpm -C packages/sandbox-windows-srt typecheck
          if ($LASTEXITCODE) { exit $LASTEXITCODE }
          pnpm -C packages/agent typecheck
          if ($LASTEXITCODE) { exit $LASTEXITCODE }
          pnpm -C packages/cli typecheck
          if ($LASTEXITCODE) { exit $LASTEXITCODE }
