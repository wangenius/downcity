name: Publish downcity CLI package to npmjs

on:
  workflow_run:
    workflows:
      - Publish Downcity scoped packages to npmjs
    types:
      - completed
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-downcity.yml"
      - "cli/city/**"
      - "cli/town/**"
      - "cli/downcity/**"
      - "products/console/**"
      - "packages/type/package.json"
      - "packages/shell/package.json"
      - "packages/agent/package.json"
      - "packages/city/package.json"
      - "packages/services/package.json"
      - "packages/plugins/package.json"
      - "packages/ui/package.json"
      - "pnpm-lock.yaml"
  workflow_dispatch:

concurrency:
  group: publish-downcity-cli-package
  cancel-in-progress: false

jobs:
  publish:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.13.1"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Check published version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(node -p "require('./cli/downcity/package.json').version")"

          if npm view "downcity@${VERSION}" version >/dev/null 2>&1; then
            echo "downcity@${VERSION} already exists, skipping publish"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "downcity@${VERSION} is not published yet"
          echo "should_publish=true" >> "$GITHUB_OUTPUT"

      - name: Install workspace dependencies
        if: steps.version.outputs.should_publish == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build downcity CLI package
        if: steps.version.outputs.should_publish == 'true'
        run: |
          set -euo pipefail
          pnpm -C packages/type build
          pnpm -C packages/shell build
          pnpm -C packages/agent build
          pnpm -C packages/city build
          pnpm -C packages/services build
          pnpm -C packages/plugins build
          pnpm -C packages/ui build
          pnpm -C cli/city build
          pnpm -C cli/town build
          pnpm -C products/console build
          pnpm -C cli/downcity build

      - name: Validate npm token and package ownership
        if: steps.version.outputs.should_publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_DOWNCITY }}
        run: |
          set -euo pipefail
          WHOAMI="$(npm whoami)"
          echo "Authenticated npm user: ${WHOAMI}"
          if npm view downcity version >/dev/null 2>&1; then
            npm owner ls downcity
            if ! npm owner ls downcity | awk '{print $1}' | grep -qx "${WHOAMI}"; then
              echo "NPM_TOKEN_DOWNCITY user '${WHOAMI}' is not an owner of 'downcity'."
              exit 1
            fi
          else
            echo "downcity is not published yet. Skipping owner check for first publish."
          fi

      - name: Pack and publish downcity
        if: steps.version.outputs.should_publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_DOWNCITY }}
        run: |
          set -euo pipefail

          VERSION="$(node -p "require('./cli/downcity/package.json').version")"

          if npm view downcity versions --json >/tmp/downcity-versions.json 2>/dev/null; then
            if grep -q "\"${VERSION}\"" /tmp/downcity-versions.json; then
              echo "downcity@${VERSION} already exists, skipping publish"
              exit 0
            fi
          fi

          PACK_DIR="$(mktemp -d)"
          pnpm -C cli/downcity pack --pack-destination "${PACK_DIR}" >/dev/null
          DOWNCITY_TARBALL="$(find "${PACK_DIR}" -maxdepth 1 -name '*.tgz' -print -quit)"
          if [[ -z "${DOWNCITY_TARBALL}" ]]; then
            echo "No downcity tarball generated."
            exit 1
          fi

          npm publish "${DOWNCITY_TARBALL}" --access public
