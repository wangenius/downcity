<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Page not found - Downcity</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <style>
      :root {
        color-scheme: light dark;
        font-family: "IBM Plex Sans", ui-sans-serif, system-ui, sans-serif;
        background: #f7f7f5;
        color: #171717;
      }
      body {
        align-items: center;
        display: flex;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
        padding: 24px;
      }
      main {
        max-width: 560px;
        width: 100%;
      }
      .code {
        font-family: "IBM Plex Mono", ui-monospace, monospace;
        font-size: 0.75rem;
        letter-spacing: 0;
        text-transform: uppercase;
      }
      h1 {
        font-size: clamp(2rem, 8vw, 4rem);
        letter-spacing: 0;
        line-height: 1;
        margin: 16px 0;
      }
      p {
        color: #666;
        line-height: 1.7;
        margin: 0 0 28px;
      }
      a {
        color: inherit;
        font-weight: 600;
        text-underline-offset: 4px;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          background: #111;
          color: #f5f5f5;
        }
        p {
          color: #aaa;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="code">404 / Downcity</div>
      <h1>Page not found</h1>
      <p>The address may be incorrect, or the page may have moved.</p>
      <a href="/">Return to Downcity</a>
    </main>
  </body>
</html>
