name: Deploy homepage to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-homepage.yml"
      - "homepage/**"
      - "packages/ui/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  workflow_dispatch:

concurrency:
  group: deploy-downcity-homepage
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy homepage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.13.1"
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck homepage
        run: pnpm -C homepage typecheck

      - name: Build homepage
        run: pnpm -C homepage build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.95.0"
          workingDirectory: homepage
          command: pages deploy build/client --project-name downcity-homepage --branch main --commit-hash ${{ github.sha }}
