name: Publish to npmjs

on:
  push:
    branches: [ main ]

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: package
        run: npm install --legacy-peer-deps

      - name: Build package
        working-directory: package
        run: npm run build

      - name: Validate npm token and package ownership
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          WHOAMI="$(npm whoami)"
          echo "Authenticated npm user: ${WHOAMI}"
          npm owner ls downcity
          if ! npm owner ls downcity | awk '{print $1}' | grep -qx "${WHOAMI}"; then
            echo "NPM_TOKEN user '${WHOAMI}' is not an owner of 'downcity'."
            exit 1
          fi

      - name: Check version and publish
        working-directory: package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="$(node -p \"require('./package.json').version\")"
          if npm view downcity versions --json | grep -q "\"${VERSION}\""; then
            echo "Version ${VERSION} already exists, skipping publish"
            exit 0
          fi
          npm publish --access public
