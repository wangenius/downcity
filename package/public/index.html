<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShipMyAgent TUI</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="dot"></span>
          <h1>ShipMyAgent TUI</h1>
        </div>
        <div class="topbar-actions">
          <button id="refresh-all-btn" class="btn">全量刷新</button>
          <span id="topbar-status" class="topbar-status">连接中...</span>
        </div>
      </header>

      <div class="workspace">
        <aside class="panel contexts-panel">
          <div class="panel-title-row">
            <h2>Contexts</h2>
            <span id="contexts-count" class="count-chip">0</span>
          </div>
          <input id="context-search" class="text-input" placeholder="过滤 contextId" />
          <div id="context-list" class="context-list"></div>
        </aside>

        <section class="panel messages-panel">
          <div class="panel-title-row">
            <h2 id="messages-title">消息历史</h2>
            <button id="refresh-messages-btn" class="btn">刷新消息</button>
          </div>
          <div id="message-list" class="message-list"></div>
          <div class="composer">
            <textarea id="message-input" class="text-input" rows="4" placeholder="给当前 context 发送指令（Ctrl/Cmd + Enter）"></textarea>
            <div class="composer-actions">
              <button id="send-btn" class="btn primary">发送到当前 context</button>
            </div>
          </div>
        </section>

        <aside class="panel right-panel">
          <section class="sub-panel">
            <div class="panel-title-row">
              <h3>Services</h3>
              <button id="refresh-services-btn" class="btn">刷新</button>
            </div>
            <div id="services-table" class="table-wrap"></div>
          </section>

          <section class="sub-panel">
            <div class="panel-title-row">
              <h3>Tasks</h3>
              <button id="refresh-tasks-btn" class="btn">刷新</button>
            </div>
            <div id="tasks-table" class="table-wrap"></div>
            <div class="panel-title-row nested">
              <h4 id="task-runs-title">Task Runs</h4>
              <button id="refresh-runs-btn" class="btn">刷新</button>
            </div>
            <div id="task-runs-table" class="table-wrap"></div>
            <div class="panel-title-row nested">
              <h4>Run Detail</h4>
            </div>
            <div id="task-run-detail" class="run-detail">选择一个 run 查看执行过程</div>
          </section>

          <section class="sub-panel">
            <div class="panel-title-row">
              <h3>Logs</h3>
              <button id="refresh-logs-btn" class="btn">刷新</button>
            </div>
            <pre id="logs-view" class="logs-view">加载中...</pre>
          </section>
        </aside>
      </div>
    </div>

    <div id="toast" class="toast"></div>
    <script src="./app.js"></script>
  </body>
</html>
